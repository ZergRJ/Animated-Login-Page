<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interface conceitual de login com tema alternável e visual espacial.">
    <title>Portal do Universo | Login</title>
    <link rel="stylesheet" href="estilos/login.css">
</head>
<body data-page="login">
    <main class="auth-layout">
        <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Alternar tema">
            Tema escuro
        </button>

        <section class="login" aria-labelledby="page-title">
            <p class="eyebrow">Portal do Universo</p>
            <h1 id="page-title">Entrar</h1>
            <p class="page-description">Acesse o painel da experiencia e continue sua jornada visual.</p>

            <form id="login-form" novalidate>
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder=" " autocomplete="email" required>
                    <label for="email">E-mail</label>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" name="senha" placeholder=" " autocomplete="current-password" required minlength="8">
                    <label for="senha">Senha</label>
                </div>

                <div class="remember-forgot">
                    <label for="manter-conectado"><input type="checkbox" name="manter-conectado" id="manter-conectado">Manter conectado.</label>
                    <a href="recover.html">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-btn">Entrar no painel</button>

                <div class="register-link">
                    <p>Não tem uma conta ainda? <a href="register.html">Criar cadastro</a></p>
                </div>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
