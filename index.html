<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="estilos/login.css">
</head>
<body>
    <main>
        
        <section class="login">
            <h2>Login</h2>
            <form id="login-form">
                <div class="input-group">
                    <input type="email" id="email" name="email" placeholder=" " required>
                    <label>E-mail</label>
                </div>

                <div class="input-group">
                    <input type="password" id="senha" name="senha" placeholder=" " required minlength="8">
                    <label>Senha</label>
                </div>

                <div class="remember-forgot">
                    <label><input type="checkbox" name="manter-conectado" id="manter-conectado">Manter conectado.</label>
                    <a href="#">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
                
                <div class="register-link">
                <p>Não tem uma conta ainda? <a href="#">Registre-se!</a></p>
                </div>
            </form>
        </section>

        <script src="script.js"></script>
    </main>
</body>
</html>
